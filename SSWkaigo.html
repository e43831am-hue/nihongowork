<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>介護の日本語 | ফ্ল্যাশকার্ড ও কুইজ</title>
<style>
:root{
  --bg:#0f1923;--s1:#1a2533;--s2:#243040;--acc:#d4af37;--accB:#c0392b;
  --tx:#f0e6d3;--txM:#b8a99e;--brd:#2e3f52;--grn:#27ae60;--red:#e74c3c;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',Arial,sans-serif;min-height:100vh}
h1{font-size:1.5rem;font-weight:900;color:var(--acc);text-align:center;padding:18px 0 4px}
.subtitle{text-align:center;color:var(--txM);font-size:.85rem;margin-bottom:18px}
/* NAV */
#homeV{padding:16px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;max-width:700px;margin:0 auto}
.cat-card{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:14px 10px;cursor:pointer;text-align:center;transition:.2s}
.cat-card:hover{border-color:var(--acc);background:var(--s2)}
.cat-icon{font-size:2rem;margin-bottom:6px}
.cat-title{font-size:.85rem;font-weight:700;color:var(--tx);margin-bottom:2px}
.cat-bn{font-size:.75rem;color:var(--txM)}
/* MODULE */
.mod{display:none;padding:16px;max-width:700px;margin:0 auto}
/* HOME BTN */
#home-btn{display:none;position:fixed;bottom:20px;right:20px;background:var(--acc);color:#000;border:none;border-radius:50px;padding:10px 20px;font-weight:700;cursor:pointer;font-size:.9rem;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.4)}
/* TAB */
.tabs{display:flex;gap:8px;margin-bottom:18px;justify-content:center}
.tab-btn{padding:10px 24px;border-radius:50px;border:1px solid var(--brd);background:var(--s2);color:var(--txM);cursor:pointer;font-size:.9rem;font-weight:700;transition:.2s}
.tab-btn.active{background:var(--acc);color:#000;border-color:var(--acc)}
/* FLASHCARD */
.fc-wrap{perspective:1000px}
.fc{width:100%;min-height:200px;border-radius:var(--r);cursor:pointer;position:relative;transform-style:preserve-3d;transition:.5s;margin-bottom:16px}
.fc.flip{transform:rotateY(180deg)}
.fc-f,.fc-b{
  position:absolute;inset:0;border-radius:var(--r);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;backface-visibility:hidden;
}
.fc-f{background:var(--s1);border:2px solid var(--brd)}
.fc-b{background:var(--s2);border:2px solid var(--acc);transform:rotateY(180deg)}
.fc-main{font-size:3.5rem;font-weight:900;color:var(--acc);margin-bottom:8px}
.fc-sub{font-size:1rem;color:var(--txM)}
.fc-label{font-size:.75rem;color:var(--txM);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.fc-meaning{font-size:1.4rem;font-weight:700;color:var(--tx);margin-bottom:6px}
.fc-reading{font-size:1rem;color:var(--acc)}
.fc-ex{font-size:.82rem;color:var(--txM);margin-top:6px}
.fc-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.fc-nav button{background:var(--s2);border:1px solid var(--brd);color:var(--tx);padding:8px 18px;border-radius:50px;cursor:pointer;font-size:.9rem}
.fc-nav button:hover{border-color:var(--acc)}
.fc-counter{color:var(--txM);font-size:.85rem}
.tts{background:var(--s2);border:1px solid var(--brd);color:var(--acc);padding:4px 10px;border-radius:20px;cursor:pointer;font-size:.75rem;margin-top:8px}
/* QUIZ */
.quiz-q{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:20px;text-align:center;margin-bottom:18px}
.quiz-main{font-size:2.8rem;font-weight:900;color:var(--acc);margin-bottom:8px}
.quiz-label{font-size:.8rem;color:var(--txM)}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{padding:14px;border-radius:var(--r);border:1.5px solid var(--brd);background:var(--s2);color:var(--tx);cursor:pointer;font-size:.9rem;transition:.2s;text-align:center}
.opt:hover{border-color:var(--acc)}
.opt.correct{border-color:var(--grn);background:rgba(39,174,96,.15);color:var(--grn)}
.opt.wrong{border-color:var(--red);background:rgba(231,76,60,.1);color:var(--red)}
.quiz-result{text-align:center;padding:24px;background:var(--s1);border-radius:var(--r);border:1px solid var(--brd)}
.score-big{font-size:3rem;font-weight:900;color:var(--acc)}
.score-sub{color:var(--txM);margin-bottom:16px}
.btn-prim{padding:12px 28px;background:var(--acc);color:#000;border:none;border-radius:50px;font-weight:700;cursor:pointer;font-size:.95rem}
.btn-prim:hover{opacity:.9}
/* SECTION HEAD */
.section-h{font-size:1rem;font-weight:700;color:var(--acc);margin:16px 0 10px;display:flex;align-items:center;gap:8px}
.badge{background:var(--s2);border:1px solid var(--brd);border-radius:20px;padding:3px 10px;font-size:.75rem;color:var(--txM)}
/* PROGRESS */
.prog-bar{background:var(--s2);border-radius:10px;height:6px;margin-bottom:16px;overflow:hidden}
.prog-fill{height:100%;background:var(--acc);border-radius:10px;transition:.3s}
/* RESPONSIVE */
@media(max-width:480px){.fc-main{font-size:2.6rem}.quiz-main{font-size:2rem}.opts{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- HOME -->
<div id="homeV">
  <h1>🏮 介護の日本語</h1>
  <p class="subtitle">介護士のための日本語単語・漢字学習 | পরিচর্যা কর্মীদের জন্য জাপানি ভাষা</p>
  <div class="cat-grid" id="catGrid"></div>
</div>

function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function speak(t){if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='ja-JP';u.rate=0.85;const vs=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('ja'));if(vs.length)u.voice=vs[0];speechSynthesis.speak(u)}

let curCat='', curView='';

// ============================================================
// HOME RENDER
// ============================================================
function renderHome(){
  const g=document.getElementById('catGrid');
  g.innerHTML='';
  KAIGO_CATS.forEach(c=>{
    const k=KAIGO_KANJI[c.id]||[];
    const v=KAIGO_VOCAB[c.id]||[];
    const d=document.createElement('div');
    d.className='cat-card';
    d.innerHTML=`<div class="cat-icon">${c.icon}</div>
      <div class="cat-title">${c.id}</div>
      <div class="cat-bn">${c.bn}</div>
      <div style="margin-top:8px;font-size:.72rem;color:var(--txM)">漢字${k.length} | 単語${v.length}</div>`;
    d.onclick=()=>openCat(c.id);
    g.appendChild(d);
  });
}

// ============================================================
// OPEN CATEGORY
// ============================================================
function openCat(catId){
  curCat=catId;
  document.getElementById('homeV').style.display='none';
  // Remove old mod if exists
  let old=document.getElementById('mod-'+catId.replace(/[^a-z0-9]/gi,'_'));
  if(old)old.remove();
  const m=document.createElement('div');
  m.id='mod-'+catId.replace(/[^a-z0-9]/gi,'_');
  m.className='mod';
  m.style.display='block';
  document.body.appendChild(m);
  renderCatView(m, catId, 'kanji-flash');
  document.getElementById('home-btn').style.display='flex';
  window.scrollTo(0,0);
}

function goHome(){
  document.querySelectorAll('.mod').forEach(m=>{m.style.display='none';m.remove()});
  document.getElementById('homeV').style.display='block';
  document.getElementById('home-btn').style.display='none';
}

// ============================================================
// CATEGORY VIEW
// ============================================================
function renderCatView(container, catId, view){
  const cat=KAIGO_CATS.find(c=>c.id===catId);
  const kanjiData=KAIGO_KANJI[catId]||[];
  const vocabData=KAIGO_VOCAB[catId]||[];

  container.innerHTML=`
    <h1>${cat.icon} ${cat.id}</h1>
    <p class="subtitle">${cat.bn}</p>
    <div class="tabs">
      <button class="tab-btn ${view==='kanji-flash'?'active':''}" onclick="switchView('${catId}','kanji-flash')">漢字フラッシュ</button>
      <button class="tab-btn ${view==='kanji-quiz'?'active':''}" onclick="switchView('${catId}','kanji-quiz')">漢字クイズ</button>
      <button class="tab-btn ${view==='vocab-flash'?'active':''}" onclick="switchView('${catId}','vocab-flash')">単語フラッシュ</button>
      <button class="tab-btn ${view==='vocab-quiz'?'active':''}" onclick="switchView('${catId}','vocab-quiz')">単語クイズ</button>
    </div>
    <div id="viewBody"></div>
  `;

  const vb=container.querySelector('#viewBody');
  if(view==='kanji-flash') renderKanjiFlash(vb, kanjiData);
  else if(view==='kanji-quiz') renderKanjiQuiz(vb, kanjiData);
  else if(view==='vocab-flash') renderVocabFlash(vb, vocabData);
  else if(view==='vocab-quiz') renderVocabQuiz(vb, vocabData);
}

function switchView(catId, view){
  const m=document.getElementById('mod-'+catId.replace(/[^a-z0-9]/gi,'_'));
  if(m) renderCatView(m, catId, view);
}

// KANJI FLASHCARD  [kanji, on, kun, bn, ex]
// ============================================================
function renderKanjiFlash(container, data){
  if(!data.length){container.innerHTML='<p style="text-align:center;color:var(--txM);padding:40px">漢字データなし</p>';return}
  const items=shuf([...data]);
  let idx=0;
  function render(){
    const d=items[idx];
    container.innerHTML=`
      <div class="section-h">漢字フラッシュカード <span class="badge">${data.length}枚</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${((idx+1)/items.length*100)}%"></div></div>
      <div class="fc-wrap">
        <div class="fc" id="fc" onclick="document.getElementById('fc').classList.toggle('flip')">
          <div class="fc-f">
            <div class="fc-label">漢字</div>
            <div class="fc-main">${d[0]}</div>
            <div class="fc-sub">タップして意味を見る</div>
            <button class="tts" onclick="event.stopPropagation();speak('${d[0]}')">🔊 読む</button>
          </div>
          <div class="fc-b">
            <div class="fc-label">読み方・意味</div>
            <div class="fc-main" style="font-size:2.5rem">${d[0]}</div>
            <div class="fc-reading">音：${d[1]}　訓：${d[2]}</div>
            <div class="fc-meaning">${d[3]}</div>
            <div class="fc-ex">例：${d[4]}</div>
            <button class="tts" onclick="event.stopPropagation();speak('${d[4]}')">🔊 例を読む</button>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button onclick="changeKanjiFC(-1)">← 前</button>
        <span class="fc-counter">${idx+1} / ${items.length}</span>
        <button onclick="changeKanjiFC(1)">次 →</button>
      </div>
    `;
  }
  window._kfItems=items;
  window._kfIdx=0;
  window.changeKanjiFC=function(dir){
    window._kfIdx=(window._kfIdx+dir+window._kfItems.length)%window._kfItems.length;
    idx=window._kfIdx;render();
  };
  render();
}

// VOCAB FLASHCARD  [word, reading, bn]
// ============================================================
function renderVocabFlash(container, data){
  if(!data.length){container.innerHTML='<p style="text-align:center;color:var(--txM);padding:40px">単語データなし</p>';return}
  const items=shuf([...data]);
  let idx=0;
  function render(){
    const d=items[idx];
    container.innerHTML=`
      <div class="section-h">単語フラッシュカード <span class="badge">${data.length}枚</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${((idx+1)/items.length*100)}%"></div></div>
      <div class="fc-wrap">
        <div class="fc" id="fc2" onclick="document.getElementById('fc2').classList.toggle('flip')">
          <div class="fc-f">
            <div class="fc-label">単語</div>
            <div class="fc-main" style="font-size:${d[0].length>6?'1.8rem':'2.8rem'}">${d[0]}</div>
            <div class="fc-sub">タップして意味を見る</div>
            <button class="tts" onclick="event.stopPropagation();speak('${d[1]}')">🔊 読む</button>
          </div>
          <div class="fc-b">
            <div class="fc-label">読み方・意味</div>
            <div class="fc-main" style="font-size:${d[0].length>6?'1.6rem':'2.2rem'}">${d[0]}</div>
            <div class="fc-reading">${d[1]}</div>
            <div class="fc-meaning">${d[2]}</div>
            <button class="tts" onclick="event.stopPropagation();speak('${d[1]}')">🔊 読む</button>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button onclick="changeVocabFC(-1)">← 前</button>
        <span class="fc-counter">${idx+1} / ${items.length}</span>
        <button onclick="changeVocabFC(1)">次 →</button>
      </div>
    `;
  }
  window._vfItems=items;
  window._vfIdx=0;
  window.changeVocabFC=function(dir){
    window._vfIdx=(window._vfIdx+dir+window._vfItems.length)%window._vfItems.length;
    idx=window._vfIdx;render();
  };
  render();
}

// ============================================================
// KANJI QUIZ
// ============================================================
function renderKanjiQuiz(container, data){
  if(data.length<4){container.innerHTML='<p style="text-align:center;color:var(--txM);padding:40px">データが少なすぎます（最低4個必要）</p>';return}
  const items=shuf([...data]);
  let idx=0,score=0,answered=false;
  function render(){
    if(idx>=items.length){
      container.innerHTML=`<div class="quiz-result">
        <div class="score-big">${score}/${items.length}</div>
        <div class="score-sub">スコア: ${Math.round(score/items.length*100)}%</div>
        <button class="btn-prim" onclick="renderKanjiQuiz(document.getElementById('viewBody'),window._kqData)">もう一度 🔄</button>
      </div>`;
      return;
    }
    const q=items[idx];
    // Pick 3 wrong answers from data
    const wrongs=shuf(data.filter(x=>x[0]!==q[0])).slice(0,3);
    const opts=shuf([q,...wrongs]);
    answered=false;
    container.innerHTML=`
      <div class="section-h">漢字クイズ <span class="badge">${idx+1}/${items.length}</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${(idx/items.length*100)}%"></div></div>
      <div class="quiz-q">
        <div class="quiz-label">この漢字の意味は？（ベンガル語）</div>
        <div class="quiz-main">${q[0]}</div>
        <div style="font-size:.85rem;color:var(--txM)">音：${q[1]}　訓：${q[2]}</div>
        <button class="tts" style="margin-top:8px" onclick="speak('${q[0]}')">🔊 読む</button>
      </div>
      <div class="opts" id="opts">
        ${opts.map((o,i)=>`<button class="opt" id="opt${i}" onclick="checkKQ(${i},${opts.indexOf(q)},${i},'${q[3].replace(/'/g,"\\'")}')">
          ${o[3]}
        </button>`).join('')}
      </div>
      <div id="qfb" style="text-align:center;margin-top:14px;min-height:30px"></div>
    `;
    window._kqData=data;
    window._kqCorrectIdx=opts.indexOf(q);
    window.checkKQ=function(clicked,correct,_c,ans){
      if(answered)return;answered=true;
      if(clicked===correct){score++;document.getElementById('opt'+clicked).className='opt correct';document.getElementById('qfb').innerHTML='<span style="color:var(--grn);font-weight:700">✓ 正解！</span>'}
      else{document.getElementById('opt'+clicked).className='opt wrong';document.getElementById('opt'+correct).className='opt correct';document.getElementById('qfb').innerHTML=`<span style="color:var(--red)">✗ 正解：${ans}</span>`}
      setTimeout(()=>{idx++;render()},900);
    };
  }
  render();
}

// ============================================================
// VOCAB QUIZ
// ============================================================
function renderVocabQuiz(container, data){
  if(data.length<4){container.innerHTML='<p style="text-align:center;color:var(--txM);padding:40px">データが少なすぎます（最低4個必要）</p>';return}
  const items=shuf([...data]);
  let idx=0,score=0,answered=false;
  // Alternate between: 1=show word→guess meaning, 2=show meaning→guess reading
  function render(){
    if(idx>=items.length){
      container.innerHTML=`<div class="quiz-result">
        <div class="score-big">${score}/${items.length}</div>
        <div class="score-sub">スコア: ${Math.round(score/items.length*100)}%</div>
        <button class="btn-prim" onclick="renderVocabQuiz(document.getElementById('viewBody'),window._vqData)">もう一度 🔄</button>
      </div>`;
      return;
    }
    const q=items[idx];
    const mode=idx%2===0?'meaning':'reading'; // alternate modes
    const wrongs=shuf(data.filter(x=>x[0]!==q[0])).slice(0,3);
    answered=false;
    if(mode==='meaning'){
      const opts=shuf([q,...wrongs]);
      container.innerHTML=`
        <div class="section-h">単語クイズ <span class="badge">${idx+1}/${items.length}</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${(idx/items.length*100)}%"></div></div>
        <div class="quiz-q">
          <div class="quiz-label">この単語の意味は？</div>
          <div class="quiz-main" style="font-size:${q[0].length>6?'1.8rem':'2.4rem'}">${q[0]}</div>
          <button class="tts" style="margin-top:8px" onclick="speak('${q[1]}')">🔊 ${q[1]}</button>
        </div>
        <div class="opts">
          ${opts.map((o,i)=>`<button class="opt" id="vopt${i}" onclick="checkVQ(${i},${opts.indexOf(q)},'${q[2].replace(/'/g,"\\'")}')">
            ${o[2]}
          </button>`).join('')}
        </div>
        <div id="vqfb" style="text-align:center;margin-top:14px;min-height:30px"></div>
      `;
    } else {
      // Show meaning → guess reading/word
      const opts=shuf([q,...wrongs]);
      container.innerHTML=`
        <div class="section-h">単語クイズ <span class="badge">${idx+1}/${items.length}</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${(idx/items.length*100)}%"></div></div>
        <div class="quiz-q">
          <div class="quiz-label">この意味の単語は？</div>
          <div class="quiz-main" style="font-size:1.5rem">${q[2]}</div>
        </div>
        <div class="opts">
          ${opts.map((o,i)=>`<button class="opt" id="vopt${i}" onclick="checkVQ(${i},${opts.indexOf(q)},'${q[0].replace(/'/g,"\\'")}')">
            ${o[0]}（${o[1]}）
          </button>`).join('')}
        </div>
        <div id="vqfb" style="text-align:center;margin-top:14px;min-height:30px"></div>
      `;
    }
    window._vqData=data;
    window.checkVQ=function(clicked,correct,ans){
      if(answered)return;answered=true;
      if(clicked===correct){score++;document.getElementById('vopt'+clicked).className='opt correct';document.getElementById('vqfb').innerHTML='<span style="color:var(--grn);font-weight:700">✓ 正解！</span>'}
      else{document.getElementById('vopt'+clicked).className='opt wrong';document.getElementById('vopt'+correct).className='opt correct';document.getElementById('vqfb').innerHTML=`<span style="color:var(--red)">✗ 正解：${ans}</span>`}
      setTimeout(()=>{idx++;render()},900);
    };
  }
  render();
}
